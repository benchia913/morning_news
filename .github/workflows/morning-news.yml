name: Morning News Summary

on:
  schedule:
    # 7:30 AM SGT
    - cron: "30 23 * * *"
    # 12:00 PM SGT
    - cron: "0 4 * * *"
    # 6:00 PM SGT
    - cron: "0 10 * * *"
    # 10:00 PM SGT
    - cron: "0 14 * * *"
  workflow_dispatch: {}

jobs:
  send-news:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run morning news script
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          NEWS_COUNTRY: ${{ secrets.NEWS_COUNTRY }}
          NEWS_COUNTRIES: ${{ secrets.NEWS_COUNTRIES }}
          NEWS_CATEGORIES: ${{ secrets.NEWS_CATEGORIES }}
          NEWS_CATEGORY: ${{ secrets.NEWS_CATEGORY }}
          NEWS_QUERY: ${{ secrets.NEWS_QUERY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python morning_news.py

